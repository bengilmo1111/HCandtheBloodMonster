<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="HC and the Blood Monster: a kid-friendly retro text adventure at Hutt Central School."
    />
    <title>HC and the Blood Monster</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" class="crt-shell" aria-live="polite">
      <section class="top-panel" aria-label="Game header">
        <div>
          <p class="kicker">Hutt Central School Mystery Club presents</p>
          <h1>HC and the Blood Monster</h1>
        </div>
        <div class="status-lights" aria-label="Game status">
          <button id="read-toggle" type="button" class="read-toggle" aria-pressed="false" title="Read scene text out loud">
            READ ALOUD: OFF
          </button>
          <span id="save-status">READY</span>
        </div>
      </section>

      <section class="terminal scene-panel" aria-label="Current scene and story terminal">
        <figure class="scene-picture" aria-label="Current scene picture">
          <img id="scene-art" class="scene-art" alt="" width="320" height="200" decoding="async" />
          <figcaption id="scene-caption"></figcaption>
        </figure>

        <div id="story-log" class="story-log"></div>
        <form id="command-form" class="command-form" autocomplete="off">
          <label for="command-input">Type a number, a command, or tap a choice. Try MAP or HINT if you get stuck.</label>
          <div class="prompt-row">
            <span aria-hidden="true">&gt;</span>
            <input id="command-input" inputmode="text" placeholder="try: map, hint, go hall" />
            <button type="submit">ENTER</button>
          </div>
        </form>
      </section>

      <nav id="choices" class="choices" aria-label="Choices"></nav>

      <section class="inventory-panel" aria-label="Notebook and inventory">
        <button type="button" id="notebook-toggle" class="notebook-toggle" aria-expanded="false">
          MYSTERY CLUB NOTEBOOK ▼
        </button>
        <ul id="inventory-list"></ul>
      </section>
    </main>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
